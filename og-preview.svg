<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d0f"/>
      <stop offset="100%" stop-color="#131318"/>
    </linearGradient>

    <!-- Amber glow for logo mark -->
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle top highlight -->
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f5a623" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#f5a623" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#f5a623" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e1e26"/>
      <stop offset="100%" stop-color="#161620"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1f1a14"/>
      <stop offset="100%" stop-color="#19160e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#141e1a"/>
      <stop offset="100%" stop-color="#0f1914"/>
    </linearGradient>

    <!-- Noise / grain texture via turbulence -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic"/>
    </filter>

    <!-- Soft glow filter for the mark -->
    <filter id="markGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Soft drop shadow for cards -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <clipPath id="roundCard1"><rect x="710"  y="160" width="155" height="195" rx="16"/></clipPath>
    <clipPath id="roundCard2"><rect x="882"  y="130" width="155" height="250" rx="16"/></clipPath>
    <clipPath id="roundCard3"><rect x="1054" y="155" width="115" height="220" rx="16"/></clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blob (left-center) -->
  <ellipse cx="340" cy="315" rx="320" ry="220" fill="url(#glowCenter)" opacity="0.7"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0"    y1="105" x2="1200" y2="105"/>
    <line x1="0"    y1="210" x2="1200" y2="210"/>
    <line x1="0"    y1="315" x2="1200" y2="315"/>
    <line x1="0"    y1="420" x2="1200" y2="420"/>
    <line x1="0"    y1="525" x2="1200" y2="525"/>
    <line x1="200"  y1="0"   x2="200"  y2="630"/>
    <line x1="400"  y1="0"   x2="400"  y2="630"/>
    <line x1="600"  y1="0"   x2="600"  y2="630"/>
    <line x1="800"  y1="0"   x2="800"  y2="630"/>
    <line x1="1000" y1="0"   x2="1000" y2="630"/>
  </g>

  <!-- Top amber accent line -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#topLine)"/>

  <!-- ── RIGHT: MOCK UI CARDS ── -->

  <!-- Card 1 — Exposure/Contrast sliders -->
  <rect x="710" y="160" width="155" height="195" rx="16" fill="url(#card1)" filter="url(#cardShadow)" stroke="#2a2a3a" stroke-width="1"/>
  <text x="726" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#8888aa" letter-spacing="1">LIGHT</text>
  <!-- Slider rows -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="#ccccdd">
    <!-- Exposure -->
    <text x="726" y="215">Exposure</text>
    <rect x="726" y="220" width="124" height="4" rx="2" fill="#252535"/>
    <rect x="726" y="220" width="80"  height="4" rx="2" fill="#f5a623"/>
    <circle cx="806" cy="222" r="6" fill="#f5a623" stroke="#0d0d0f" stroke-width="1.5"/>
    <!-- Brightness -->
    <text x="726" y="248">Brightness</text>
    <rect x="726" y="253" width="124" height="4" rx="2" fill="#252535"/>
    <rect x="726" y="253" width="55"  height="4" rx="2" fill="#f5a623"/>
    <circle cx="781" cy="255" r="6" fill="#f5a623" stroke="#0d0d0f" stroke-width="1.5"/>
    <!-- Contrast -->
    <text x="726" y="281">Contrast</text>
    <rect x="726" y="286" width="124" height="4" rx="2" fill="#252535"/>
    <rect x="726" y="286" width="95"  height="4" rx="2" fill="#f5a623"/>
    <circle cx="821" cy="288" r="6" fill="#f5a623" stroke="#0d0d0f" stroke-width="1.5"/>
    <!-- Highlights -->
    <text x="726" y="314">Highlights</text>
    <rect x="726" y="319" width="124" height="4" rx="2" fill="#252535"/>
    <rect x="726" y="319" width="40"  height="4" rx="2" fill="#f5a623"/>
    <circle cx="766" cy="321" r="6" fill="#f5a623" stroke="#0d0d0f" stroke-width="1.5"/>
  </g>

  <!-- Card 2 — Filter strip (tallest) -->
  <rect x="882" y="130" width="155" height="250" rx="16" fill="url(#card2)" filter="url(#cardShadow)" stroke="#2a2018" stroke-width="1"/>
  <text x="898" y="160" font-family="system-ui,sans-serif" font-size="11" fill="#8888aa" letter-spacing="1">PRESETS</text>
  <!-- Filter tiles, 2×3 grid -->
  <g>
    <!-- Row 1 -->
    <rect x="898" y="168" width="56" height="56" rx="8" fill="#1a1206"/>
    <rect x="898" y="168" width="56" height="56" rx="8" fill="#f5a623" fill-opacity="0.12" stroke="#f5a623" stroke-width="1.5"/>
    <text x="926" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#f5a623">Original</text>

    <rect x="963" y="168" width="56" height="56" rx="8" fill="#0d1420"/>
    <text x="991" y="202" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#7799cc">Chrome</text>

    <!-- Row 2 -->
    <rect x="898" y="232" width="56" height="56" rx="8" fill="#1a100a"/>
    <text x="926" y="266" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#cc8855">Sunset</text>

    <rect x="963" y="232" width="56" height="56" rx="8" fill="#0e1a12"/>
    <text x="991" y="266" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#66bb88">Forest</text>

    <!-- Row 3 -->
    <rect x="898" y="296" width="56" height="56" rx="8" fill="#18121a"/>
    <text x="926" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#aa77cc">Dreamy</text>

    <rect x="963" y="296" width="56" height="56" rx="8" fill="#101010"/>
    <text x="991" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#888899">Matte</text>
  </g>

  <!-- Card 3 — Effects -->
  <rect x="1054" y="155" width="115" height="220" rx="16" fill="url(#card3)" filter="url(#cardShadow)" stroke="#1a2820" stroke-width="1"/>
  <text x="1068" y="185" font-family="system-ui,sans-serif" font-size="11" fill="#8888aa" letter-spacing="1">EFFECTS</text>
  <g font-family="system-ui,sans-serif" fill="#ccccdd">
    <!-- Effect rows -->
    <rect x="1068" y="195" width="87" height="28" rx="6" fill="#1c2820"/>
    <text x="1076" y="214" font-size="10" fill="#66cc88">Portrait Blur</text>

    <rect x="1068" y="231" width="87" height="28" rx="6" fill="#201c10"/>
    <text x="1076" y="250" font-size="10" fill="#f5a623">Bokeh</text>

    <rect x="1068" y="267" width="87" height="28" rx="6" fill="#1a1030"/>
    <text x="1076" y="286" font-size="10" fill="#9977ee">Cinematic</text>

    <rect x="1068" y="303" width="87" height="28" rx="6" fill="#201818"/>
    <text x="1076" y="322" font-size="10" fill="#ee7777">Film Grain</text>

    <rect x="1068" y="339" width="87" height="28" rx="6" fill="#101820"/>
    <text x="1076" y="358" font-size="10" fill="#77aaee">Dreamy</text>
  </g>

  <!-- ── LEFT: MAIN CONTENT ── -->

  <!-- ✦ Logo mark -->
  <text x="96" y="238" text-anchor="middle" font-family="Georgia,serif" font-size="72" fill="#f5a623" filter="url(#markGlow)" opacity="0.95">✦</text>

  <!-- Wordmark -->
  <text x="96" y="290" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="28" font-weight="700" fill="#f5a623" letter-spacing="6">LUX</text>
  <text x="96" y="320" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="14" font-weight="400" fill="#888899" letter-spacing="8">EDITOR</text>

  <!-- Divider -->
  <line x1="140" y1="350" x2="560" y2="350" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Main headline -->
  <text x="140" y="230" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700" fill="#f0f0f8" letter-spacing="-1">Premium Photo</text>
  <text x="140" y="293" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700">
    <tspan fill="#f5a623">Editing</tspan>
    <tspan fill="#f0f0f8" font-size="52"> in Your</tspan>
  </text>
  <text x="140" y="345" font-family="Georgia,'Times New Roman',serif" font-size="52" font-weight="700" fill="#f0f0f8">Browser.</text>

  <!-- Subtext -->
  <text x="140" y="390" font-family="system-ui,-apple-system,sans-serif" font-size="19" fill="#7777aa" letter-spacing="0.2">Filters · Adjustments · Crop · Text · Export</text>

  <!-- Feature pills -->
  <g font-family="system-ui,sans-serif" font-size="13" text-anchor="middle">
    <!-- Free -->
    <rect x="140" y="415" width="72" height="28" rx="14" fill="#1a2010" stroke="#3a5020" stroke-width="1"/>
    <text x="176" y="433" fill="#66cc44">✓ Free</text>
    <!-- Offline -->
    <rect x="224" y="415" width="84" height="28" rx="14" fill="#101828" stroke="#203050" stroke-width="1"/>
    <text x="266" y="433" fill="#4499ee">✓ Offline</text>
    <!-- No Upload -->
    <rect x="320" y="415" width="112" height="28" rx="14" fill="#1e1408" stroke="#40300a" stroke-width="1"/>
    <text x="376" y="433" fill="#f5a623">✓ No uploads</text>
    <!-- Pro Filters -->
    <rect x="444" y="415" width="118" height="28" rx="14" fill="#1a0e22" stroke="#3a1848" stroke-width="1"/>
    <text x="503" y="433" fill="#bb77ff">✓ Pro filters</text>
  </g>

  <!-- Bottom domain tag -->
  <text x="140" y="520" font-family="system-ui,sans-serif" font-size="14" fill="#44445a" letter-spacing="1">luxeditor.app</text>

  <!-- Right glow behind cards -->
  <ellipse cx="970" cy="315" rx="280" ry="200" fill="#f5a623" fill-opacity="0.03"/>

  <!-- Bottom-right "Made by" -->
  <text x="1170" y="612" text-anchor="end" font-family="system-ui,sans-serif" font-size="12" fill="#33334a">Made with ❤ by ShubhamNale</text>
</svg>
